<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Canvas Grid Drawer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #fff;
    }

    /* canvas fills the entire screen */
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* controls float on top of the canvas */
    #ui {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translateX(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(255,255,255,0.85);
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid #ddd;
      backdrop-filter: blur(4px);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    label {
      font-size: 13px;
      color: #666;
      font-family: sans-serif;
    }

    button {
      padding: 8px 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      background: #fff;
      font-size: 14px;
      font-family: sans-serif;
    }

    button:hover { background: #f5f5f5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #statusMsg {
      font-size: 13px;
      color: #888;
      font-family: sans-serif;
      min-height: 18px;
      background: rgba(255,255,255,0.85);
      padding: 4px 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- canvas goes first so it's behind everything -->
  <canvas id="gridCanvas"></canvas>

  <!-- UI floats on top -->
  <div id="ui">
    <div class="controls">
      <button id="drawBtn" onclick="drawGrid()">Click me to draw the grid</button>
      <button onclick="clearGrid()">Clear</button>
    </div>

    <div class="controls">
      <div class="slider-group">
        <label>lines: <span id="lineCountOut">50</span></label>
        <input type="range" min="5" max="100" value="50" step="1" id="lineCount"
          oninput="document.getElementById('lineCountOut').textContent = this.value" />
      </div>

      <div class="slider-group">
        <label>speed (ms): <span id="speedOut">30</span></label>
        <input type="range" min="1" max="200" value="30" step="1" id="speed"
          oninput="document.getElementById('speedOut').textContent = this.value" />
      </div>

      <div class="slider-group">
        <label>line color</label>
        <input type="color" id="lineColor" value="#5DCAA5" />
      </div>
    </div>

    <p id="statusMsg"></p>
  </div>

  <script>
    let animTimer = null;

    // make the canvas match the actual screen size in pixels
    const canvas = document.getElementById('gridCanvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // if the user resizes the window, update the canvas too
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    function clearGrid() {
      if (animTimer) { clearTimeout(animTimer); animTimer = null; }
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      document.getElementById('statusMsg').textContent = '';
      document.getElementById('drawBtn').disabled = false;
    }

    function drawGrid() {
      if (animTimer) return;

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const count = parseInt(document.getElementById('lineCount').value);
      const delay = parseInt(document.getElementById('speed').value);
      const color = document.getElementById('lineColor').value;

      const W = canvas.width;
      const H = canvas.height;

      ctx.strokeStyle = color;
      ctx.lineWidth = 1;

      const hStep = W / count;
      const vStep = H / count;

      const verticals = [];
      const horizontals = [];

      for (let i = 0; i <= count; i++) {
        verticals.push(Math.round(i * hStep));
        horizontals.push(Math.round(i * vStep));
      }

      let vi = 0;
      let hi = 0;

      document.getElementById('drawBtn').disabled = true;
      document.getElementById('statusMsg').textContent = 'Drawing...';

      function drawNext() {
        let batch = 0;

        while (batch < 2) {
          let didSomething = false;

          if (vi < verticals.length) {
            const x = verticals[vi];
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
            vi++;
            didSomething = true;
            batch++;
          }

          if (hi < horizontals.length) {
            const y = horizontals[hi];
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
            hi++;
            didSomething = true;
            batch++;
          }

          if (!didSomething) break;
        }

        if (vi < verticals.length || hi < horizontals.length) {
          animTimer = setTimeout(drawNext, delay);
        } else {
          animTimer = null;
          document.getElementById('drawBtn').disabled = false;
          document.getElementById('statusMsg').textContent =
            count + ' vertical + ' + count + ' horizontal = ' + (count * count) + ' boxes!';
        }
      }

      drawNext();
    }
  </script>

</body>
</html>
