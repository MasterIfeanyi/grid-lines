<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Canvas Grid Drawer</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
      background: #fff;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    label {
      font-size: 13px;
      color: #666;
    }

    button {
      padding: 8px 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      background: #fff;
      font-size: 14px;
    }

    button:hover { background: #f5f5f5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    canvas {
      border: 1px solid #ddd;
      border-radius: 8px;
      max-width: 100%;
      background: #fff;
    }

    #statusMsg {
      font-size: 13px;
      color: #888;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <div class="controls">
    <button id="drawBtn" onclick="drawGrid()">Click me to draw the grid</button>
    <button onclick="clearGrid()">Clear</button>
  </div>

  <div class="controls">
    <div class="slider-group">
      <label>lines: <span id="lineCountOut">50</span></label>
      <input type="range" min="5" max="100" value="50" step="1" id="lineCount"
        oninput="document.getElementById('lineCountOut').textContent = this.value" />
    </div>

    <div class="slider-group">
      <label>speed (ms): <span id="speedOut">30</span></label>
      <input type="range" min="1" max="200" value="30" step="1" id="speed"
        oninput="document.getElementById('speedOut').textContent = this.value" />
    </div>

    <div class="slider-group">
      <label>line color</label>
      <input type="color" id="lineColor" value="#5DCAA5" />
    </div>
  </div>

  <!-- THIS IS THE CANVAS -->
  <canvas id="gridCanvas" width="600" height="500"></canvas>

  <p id="statusMsg"></p>

  <script>
    let animTimer = null;

    function clearGrid() {
      if (animTimer) { clearTimeout(animTimer); animTimer = null; }

      const canvas = document.getElementById('gridCanvas');
      const ctx = canvas.getContext('2d'); // grab the pencil
      ctx.clearRect(0, 0, canvas.width, canvas.height); // erase everything

      document.getElementById('statusMsg').textContent = '';
      document.getElementById('drawBtn').disabled = false;
    }

    function drawGrid() {
      if (animTimer) return; // don't start if already drawing

      const canvas = document.getElementById('gridCanvas');
      const ctx = canvas.getContext('2d'); // grab the pencil
      ctx.clearRect(0, 0, canvas.width, canvas.height); // start fresh

      // read values from the controls
      const count = parseInt(document.getElementById('lineCount').value);
      const delay = parseInt(document.getElementById('speed').value);
      const color = document.getElementById('lineColor').value;

      const W = canvas.width;  // 600
      const H = canvas.height; // 500

      // set pencil color and thickness
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;

      // figure out how far apart the lines should be
      const hStep = W / count; // horizontal spacing
      const vStep = H / count; // vertical spacing

      // pre-calculate all line positions
      const verticals = [];
      const horizontals = [];

      for (let i = 0; i <= count; i++) {
        verticals.push(Math.round(i * hStep));   // x positions
        horizontals.push(Math.round(i * vStep)); // y positions
      }

      let vi = 0; // which vertical line we're on
      let hi = 0; // which horizontal line we're on

      document.getElementById('drawBtn').disabled = true;
      document.getElementById('statusMsg').textContent = 'Drawing...';

      function drawNext() {
        let batch = 0;

        while (batch < 2) {
          let didSomething = false;

          // draw the next vertical line
          if (vi < verticals.length) {
            const x = verticals[vi];
            ctx.beginPath();       // lift the pencil
            ctx.moveTo(x, 0);      // start at top
            ctx.lineTo(x, H);      // go to bottom
            ctx.stroke();          // draw it!
            vi++;
            didSomething = true;
            batch++;
          }

          // draw the next horizontal line
          if (hi < horizontals.length) {
            const y = horizontals[hi];
            ctx.beginPath();       // lift the pencil
            ctx.moveTo(0, y);      // start at left
            ctx.lineTo(W, y);      // go to right
            ctx.stroke();          // draw it!
            hi++;
            didSomething = true;
            batch++;
          }

          if (!didSomething) break;
        }

        // if there are still lines to draw, schedule the next batch
        if (vi < verticals.length || hi < horizontals.length) {
          animTimer = setTimeout(drawNext, delay); // wait `delay` ms then draw again
        } else {
          animTimer = null;
          document.getElementById('drawBtn').disabled = false;
          document.getElementById('statusMsg').textContent =
            count + ' vertical + ' + count + ' horizontal = ' + (count * count) + ' boxes!';
        }
      }

      drawNext(); // kick it off!
    }
  </script>

</body>
</html>
